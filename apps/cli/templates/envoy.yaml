# Envoy proxy configuration for local development and Codespaces
# Routes traffic between frontend (Next.js) and backend (Hono API)
#
# Routing rules (order matters - first match wins):
# 1. /api/resources/*      → backend (authenticated proxy for images/files)
# 2. /api/cookies/*        → backend (cookie consent/export)
# 3. /api/tokens/mcp-setup → backend (MCP CLI token setup)
# 4. /resources/*          → backend (main API, SSE-safe: no timeout, no buffering)
# 5. /annotations/*        → backend (main API)
# 6. /admin/*              → backend (main API)
# 7. /api/events/stream    → backend (SSE-safe: no timeout, no buffering)
# 8. /api/participants/*   → backend (SSE-safe: no timeout, no buffering)
# 9. /api/*                → backend (OpenAPI docs, spec)
# 10. /_next/*             → frontend (Next.js static assets)
# 11. /*                   → frontend (Next.js pages)

static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          http_filters:
          - name: envoy.filters.http.buffer
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.Buffer
              max_request_bytes: 10485760  # 10MB max request size
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          upgrade_configs:
          - upgrade_type: websocket
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              # Backend /api/ routes that need specific handling before generic /api/ catch-all
              - match:
                  prefix: "/api/resources/"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/api/cookies/"
                route:
                  cluster: backend
                  timeout: 30s

              # Backend API routes (without /api prefix)
              # Match /resources (exact - for POST /resources)
              - match:
                  path: "/resources"
                route:
                  cluster: backend
                  timeout: 30s
              # Match /resources/* (prefix - for GET /resources/:id)
              # Increased timeout for SSE streams at /resources/:id/events/stream
              - match:
                  prefix: "/resources/"
                route:
                  cluster: backend
                  timeout: 0s  # No timeout for SSE long-lived connections
                  idle_timeout: 3600s  # 1 hour idle timeout
                typed_per_filter_config:
                  envoy.filters.http.buffer:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.BufferPerRoute
                    disabled: true  # Disable buffering for SSE streams
              - match:
                  prefix: "/annotations/"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/admin/"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/entity-types/"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/jobs/"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/users/"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/tokens/"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/health"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/status"
                route:
                  cluster: backend
                  timeout: 30s

              # Backend SSE routes under /api/ (must come before generic /api/ catch-all)
              - match:
                  prefix: "/api/events/stream"
                route:
                  cluster: backend
                  timeout: 0s
                  idle_timeout: 3600s
                typed_per_filter_config:
                  envoy.filters.http.buffer:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.BufferPerRoute
                    disabled: true
              - match:
                  prefix: "/api/participants/"
                route:
                  cluster: backend
                  timeout: 0s
                  idle_timeout: 3600s
                typed_per_filter_config:
                  envoy.filters.http.buffer:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.BufferPerRoute
                    disabled: true

              # Backend OpenAPI documentation and other /api/ routes
              - match:
                  prefix: "/api/"
                route:
                  cluster: backend
                  timeout: 30s

              # Next.js static assets (must come before catch-all)
              - match:
                  prefix: "/_next/"
                route:
                  cluster: frontend
                  timeout: 30s

              # Everything else goes to frontend (Next.js pages)
              - match:
                  prefix: "/"
                route:
                  cluster: frontend
                  timeout: 30s

  clusters:
  - name: backend
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: {{HOST_ADDRESS}}
                port_value: {{BACKEND_PORT}}

  - name: frontend
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: frontend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: {{HOST_ADDRESS}}
                port_value: {{FRONTEND_PORT}}

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
