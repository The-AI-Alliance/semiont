name: Publish npm packages

run-name: "NPM: ${{ inputs.stable_release && 'stable' || 'dev' }} v${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false
      stable_release:
        description: 'Stable release (publish without -build.N suffix)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build
        # Frontend memory note: with `VITE_OTEL_OTLP_ENDPOINT` set at
        # build time the OTel web SDK is bundled into the SPA, and
        # vite's chunking step needs ~2GB of Node heap. Default
        # `ubuntu-latest` runners have ~7GB RAM and Node's default
        # heap (~1.7GB) is enough on the margin, but if you ever see
        # `Reached heap limit Allocation failed - JavaScript heap out
        # of memory` here, set
        # `NODE_OPTIONS=--max-old-space-size=2560` on this step.
        # With the env var unset (current default), the SDK is dynamic-
        # imported and dropped from the bundle entirely, so the build
        # is comfortably within memory.
        run: ./scripts/ci/build.sh

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./version.json').version")
          if [ "${{ inputs.stable_release }}" = "true" ]; then
            PUBLISH_VERSION="$BASE_VERSION"
            DIST_TAG="latest"
          else
            PUBLISH_VERSION="${BASE_VERSION}-build.${{ github.run_number }}"
            DIST_TAG="dev"
          fi
          echo "publish=$PUBLISH_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$DIST_TAG" >> $GITHUB_OUTPUT
          echo "Publishing version: $PUBLISH_VERSION (tag: $DIST_TAG)"

      - name: Publish
        if: inputs.dry_run != true
        run: |
          ./scripts/ci/publish.sh \
            --version "${{ steps.version.outputs.publish }}" \
            --tag "${{ steps.version.outputs.tag }}"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.publish }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Pull the published-package list from version.json (the
          # workspace's single source of truth). Library packages live
          # under `packages/`; apps under `apps/` (cli) or `.npm-stage/`
          # (backend, frontend, via the `stage` field).
          MANIFEST=$(node -e "
            const v = JSON.parse(require('fs').readFileSync('version.json', 'utf-8'));
            for (const [name, pkg] of Object.entries(v.packages)) {
              if (!pkg.publish) continue;
              const kind = pkg.dir.startsWith('packages/') ? 'lib' : 'app';
              console.log([name, kind].join('\t'));
            }
          ")

          {
            echo "## Published npm packages"
            echo ""
            echo "**Version:** $VERSION"
            echo "**Dist tag:** $TAG"
            echo ""
            echo "### Library packages:"
            while IFS=$'\t' read -r name kind; do
              [[ "$kind" == "lib" ]] && echo "- $name@$VERSION"
            done <<< "$MANIFEST"
            echo ""
            echo "### App packages:"
            while IFS=$'\t' read -r name kind; do
              [[ "$kind" == "app" ]] && echo "- $name@$VERSION"
            done <<< "$MANIFEST"
            echo ""
            echo "### Install with:"
            echo '```bash'
            while IFS=$'\t' read -r name kind; do
              [[ "$kind" == "lib" ]] && echo "npm install $name@$TAG"
            done <<< "$MANIFEST"
            while IFS=$'\t' read -r name kind; do
              [[ "$kind" == "app" ]] || continue
              if [[ "$name" == "@semiont/cli" ]]; then
                echo "npm install -g $name@$TAG"
              else
                echo "npm install $name@$TAG"
              fi
            done <<< "$MANIFEST"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
