name: "CodeQL Security Analysis"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.gitignore'
      - 'LICENSE'
  schedule:
    # Run CodeQL analysis every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript', 'go' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7.0.0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4.37.0
      with:
        languages: ${{ matrix.language }}
        # Override default CodeQL config with custom queries for better security coverage
        config-file: ./.github/codeql/codeql-config.yml

    # JS/TS extraction wants node_modules resolved; irrelevant for the Go matrix leg.
    - name: Setup Node.js
      if: matrix.language == 'javascript-typescript'
      uses: actions/setup-node@v7
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install all dependencies
      if: matrix.language == 'javascript-typescript'
      run: npm ci --include=optional
      continue-on-error: true

    # Go is a compiled language: the CodeQL extractor needs a real build to trace.
    - name: Setup Go
      if: matrix.language == 'go'
      uses: actions/setup-go@v6.5.0
      with:
        go-version-file: apps/launcher/go.mod

    - name: Build launcher for CodeQL extraction
      if: matrix.language == 'go'
      run: cd apps/launcher && go build ./...

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4.37.0
      with:
        category: "/language:${{matrix.language}}"