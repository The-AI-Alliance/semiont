version: 2
updates:
  # All npm dependencies — root + every workspace (apps/*, packages/*) in one pass.
  # A single "/" entry traverses all npm workspaces, so per-workspace entries are
  # redundant. Groups below match by package name across every workspace.
  - package-ecosystem: "npm"
    directory: "/"
    versioning-strategy: increase-if-necessary
    # Let a published version age before raising a PR — most malicious or broken
    # releases are yanked within a day or two. Security fixes are exempt: they use
    # Dependabot's security-update flow, which cooldown does not gate.
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 14
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 20
    reviewers:
      - "The-AI-Alliance/maintainers"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # react and react-dom must move in exact lockstep
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # react-i18next peer-requires a matching i18next major
      i18n:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
      # keep native platform binaries in lockstep with the tool that pins their version
      bundler-binaries:
        patterns:
          - "vite"
          - "rolldown"
          - "@rolldown/binding-*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "lightningcss"
          - "lightningcss-*"
      # AWS SDK clients are released in lockstep on a single version line
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      # @opentelemetry packages share a version line and root package.json overrides
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      # prisma CLI, @prisma/client, and driver adapters must share a version
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"

  # E2E test suite — tests/ is NOT in the root workspaces[], so "/" does not reach it;
  # it needs its own entry.
  - package-ecosystem: "npm"
    directory: "/tests/e2e"
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 14
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "The-AI-Alliance/maintainers"
    labels:
      - "dependencies"
      - "tests"
    commit-message:
      prefix: "tests"
      include: "scope"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    # Actions run in CI with repo secrets — let a release age before adopting it.
    # Security updates use a separate flow that cooldown does not gate.
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 14
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "The-AI-Alliance/maintainers"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "actions"
      include: "scope"

  # Frontend Docker base image (apps/frontend/Dockerfile) — docker is not
  # workspace-aware, so each Dockerfile keeps its own entry.
  - package-ecosystem: "docker"
    directory: "/apps/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "The-AI-Alliance/maintainers"
    labels:
      - "dependencies"
      - "frontend"
      - "docker"
    commit-message:
      prefix: "frontend-docker"
      include: "scope"

  # Desktop builder Docker base image (apps/desktop/Dockerfile.builder)
  - package-ecosystem: "docker"
    directory: "/apps/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "The-AI-Alliance/maintainers"
    labels:
      - "dependencies"
      - "desktop"
      - "docker"
    commit-message:
      prefix: "desktop-docker"
      include: "scope"
